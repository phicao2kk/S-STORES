<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký / Đăng nhập - S-STORES</title>

    <!-- ===== PRECONNECT ===== -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <!-- ===== FONT GOOGLE ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              game: {
                bg: '#0b0f19',
                card: '#131b2e',
                hover: '#1e293b',
                border: '#1f2937',
                primary: '#8b5cf6',
                secondary: '#10b981',
                accent: '#ec4899'
              }
            },
            fontFamily: {
              sans: ['Outfit', 'Inter', 'sans-serif']
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>        
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: #8b5cf6;
        }
        .shadow-glow-purple {
            box-shadow: 0 0 20px -3px rgba(139, 92, 246, 0.3);
        }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbzHvxBT1mGGIrda2b_JxinZrFTxHM3Hc",
            authDomain: "fir-s-stores-2007.firebaseapp.com",
            databaseURL: "https://fir-s-stores-2007-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fir-s-stores-2007",
            storageBucket: "fir-s-stores-2007.firebasestorage.app",
            messagingSenderId: "325985274783",
            appId: "1:325985274783:web:9601cc0ef9b3ee503ecbaa"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
    </script>
</head>
<body class="bg-game-bg text-slate-100 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Decorative background glows -->
    <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-game-primary/10 blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-game-accent/5 blur-[120px] pointer-events-none"></div>

    <div class="max-w-md w-full relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-game-primary via-purple-400 to-game-accent">S-STORES</a>
            <p class="text-slate-400 mt-2 text-sm">Đăng ký / Đăng nhập bằng Email hoặc SĐT</p>
        </div>

        <div class="bg-game-card border border-game-border shadow-glow-purple rounded-2xl p-8">
            <div class="flex gap-4 mb-6 border-b border-game-border pb-1 relative">
                <button id="btnRegister" class="flex-1 py-2 font-black text-game-primary transition uppercase tracking-wider text-sm relative z-10">Đăng ký</button>
                <button id="btnLogin" class="flex-1 py-2 font-black text-slate-500 hover:text-slate-300 transition uppercase tracking-wider text-sm relative z-10">Đăng nhập</button>
                <!-- Thanh gạch dưới di chuyển -->
                <div id="tabIndicator" class="absolute bottom-0 left-0 h-0.5 bg-game-primary transition-all duration-300" style="width: 50%;"></div>
            </div>

            <!-- ĐĂNG KÝ FORM -->
            <div id="registerForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Tên cửa hàng *</label>
                        <input type="text" id="regStoreName" placeholder="VD: Coffee Shop ABC" class="w-full p-3 bg-game-bg border border-game-border focus:border-game-primary text-white rounded-xl outline-none transition">
                        <p class="text-[10px] text-slate-500 mt-1">Tên cửa hàng sẽ hiển thị trên link và giao diện</p>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email hoặc Số điện thoại *</label>
                        <input type="text" id="regUsername" placeholder="Email hoặc SĐT (VD: 0987654321)" class="w-full p-3 bg-game-bg border border-game-border focus:border-game-primary text-white rounded-xl outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Mật khẩu *</label>
                        <div class="password-wrapper">
                            <input type="password" id="regPassword" placeholder="••••••••" class="w-full p-3 bg-game-bg border border-game-border focus:border-game-primary text-white rounded-xl pr-10 outline-none transition">
                            <i class="fas fa-eye-slash toggle-password" data-target="regPassword"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Xác nhận mật khẩu *</label>
                        <div class="password-wrapper">
                            <input type="password" id="regConfirmPassword" placeholder="••••••••" class="w-full p-3 bg-game-bg border border-game-border focus:border-game-primary text-white rounded-xl pr-10 outline-none transition">
                            <i class="fas fa-eye-slash toggle-password" data-target="regConfirmPassword"></i>
                        </div>
                    </div>
                    <button onclick="register()" id="registerBtn" class="w-full bg-gradient-to-r from-game-primary to-indigo-600 hover:from-game-primary hover:to-game-accent text-white py-3.5 rounded-xl font-black uppercase tracking-widest text-sm transition duration-300 transform hover:scale-[1.02] shadow-glow-purple mt-4">🚀 Tạo cửa hàng</button>
                </div>
            </div>

            <!-- ĐĂNG NHẬP FORM -->
            <div id="loginForm" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email hoặc Số điện thoại</label>
                        <input type="text" id="loginUsername" placeholder="Email hoặc SĐT" class="w-full p-3 bg-game-bg border border-game-border focus:border-game-primary text-white rounded-xl outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Mật khẩu</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" placeholder="••••••••" class="w-full p-3 bg-game-bg border border-game-border focus:border-game-primary text-white rounded-xl pr-10 outline-none transition">
                            <i class="fas fa-eye-slash toggle-password" data-target="loginPassword"></i>
                        </div>
                    </div>
                    <button onclick="login()" id="loginBtn" class="w-full bg-gradient-to-r from-game-primary to-indigo-600 hover:from-game-primary hover:to-game-accent text-white py-3.5 rounded-xl font-black uppercase tracking-widest text-sm transition duration-300 transform hover:scale-[1.02] shadow-glow-purple mt-4">🔐 Đăng nhập</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tabIndicator = document.getElementById('tabIndicator');

        // ==================== ẨN/HIỆN MẬT KHẨU ====================
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                let targetId = this.getAttribute('data-target');
                let input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                }
            });
        });

        // ==================== HÀM TIỆN ÍCH ====================
        function showToast(msg, type) {
            let toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 z-50 px-4 py-2.5 rounded-xl text-white text-xs font-bold uppercase tracking-wider ${type === 'success' ? 'bg-game-secondary shadow-glow-green' : 'bg-game-accent'} transition-opacity duration-300`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function createStoreId(storeName) {
            let baseId = storeName.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
            return baseId + '-' + Math.random().toString(36).substr(2, 6);
        }

        // ==================== XỬ LÝ PHÍM ENTER ====================
        function setupEnterListener() {
            // Đăng ký form
            let regInputs = ['regStoreName', 'regUsername', 'regPassword', 'regConfirmPassword'];
            regInputs.forEach(id => {
                let input = document.getElementById(id);
                if (input) {
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            register();
                        }
                    });
                }
            });

            // Đăng nhập form
            let loginInputs = ['loginUsername', 'loginPassword'];
            loginInputs.forEach(id => {
                let input = document.getElementById(id);
                if (input) {
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            login();
                        }
                    });
                }
            });
        }

        // ==================== ĐĂNG KÝ ====================
        async function register() {
            let storeName = document.getElementById('regStoreName').value.trim();
            let username = document.getElementById('regUsername').value.trim().toLowerCase();
            let password = document.getElementById('regPassword').value;
            let confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!storeName) {
                showToast("Vui lòng nhập tên cửa hàng!", "error");
                return;
            }
            if (!username) {
                showToast("Vui lòng nhập email hoặc số điện thoại!", "error");
                return;
            }
            if (!password) {
                showToast("Vui lòng nhập mật khẩu!", "error");
                return;
            }
            if (password !== confirmPassword) {
                showToast("Mật khẩu xác nhận không khớp!", "error");
                return;
            }
            if (password.length < 6) {
                showToast("Mật khẩu phải có ít nhất 6 ký tự!", "error");
                return;
            }

            try {
                const snapshot = await db.ref('users').once('value');
                let users = snapshot.val() || {};

                let existingUser = null;
                for (let key in users) {
                    if (users[key].username === username) {
                        existingUser = users[key];
                        break;
                    }
                }

                if (existingUser) {
                    showToast("Email hoặc số điện thoại đã được đăng ký!", "error");
                    return;
                }

                let storeId = createStoreId(storeName);
                let userId = Date.now().toString();
                let newUser = {
                    userId: userId,
                    storeId: storeId,
                    storeName: storeName,
                    username: username,
                    password: password,
                    createdAt: new Date().toLocaleString('vi-VN')
                };

                await db.ref('users/' + userId).set(newUser);

                let storeData = {
                    products: [],
                    combos: [],
                    orders: [],
                    importHistory: [],
                    storeInfo: {
                        storeName: storeName,
                        phone: "",
                        email: "",
                        address: "",
                        description: ""
                    }
                };
                await db.ref('stores/' + storeId).set(storeData);

                showToast("✅ Đăng ký thành công! Vui lòng đăng nhập.", "success");
                
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('btnRegister').classList.remove('text-game-primary');
                document.getElementById('btnRegister').classList.add('text-slate-500');
                document.getElementById('btnLogin').classList.add('text-game-primary');
                document.getElementById('btnLogin').classList.remove('text-slate-500');
                // Và di chuyển tabIndicator
                tabIndicator.style.left = '50%';
                
                document.getElementById('regStoreName').value = '';
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';

            } catch (error) {
                console.error("Lỗi đăng ký:", error);
                showToast("Lỗi kết nối, vui lòng thử lại!", "error");
            }
        }

        // ==================== ĐĂNG NHẬP ====================
        async function login() {
            let username = document.getElementById('loginUsername').value.trim().toLowerCase();
            let password = document.getElementById('loginPassword').value;

            if (!username) {
                showToast("Vui lòng nhập email hoặc số điện thoại!", "error");
                return;
            }
            if (!password) {
                showToast("Vui lòng nhập mật khẩu!", "error");
                return;
            }

            try {
                const snapshot = await db.ref('users').once('value');
                let users = snapshot.val() || {};

                let foundUser = null;
                for (let key in users) {
                    if (users[key].username === username && users[key].password === password) {
                        foundUser = users[key];
                        break;
                    }
                }

                if (foundUser) {
                    let loginData = {
                        userId: foundUser.userId,
                        storeId: foundUser.storeId,
                        storeName: foundUser.storeName,
                        username: foundUser.username,
                        loginAt: new Date().toLocaleString('vi-VN')
                    };
                    localStorage.setItem('currentUser', JSON.stringify(loginData));
                    
                    showToast("🎉 Đăng nhập thành công! Đang chuyển hướng...", "success");
                    setTimeout(() => {
                        window.location.href = 'dashboard.html?store=' + foundUser.storeId;
                    }, 1000);
                } else {
                    showToast("Sai email/số điện thoại hoặc mật khẩu!", "error");
                }
            } catch (error) {
                console.error("Lỗi đăng nhập:", error);
                showToast("Lỗi kết nối, vui lòng thử lại!", "error");
            }
        }

                // ==================== CHUYỂN TAB ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Không cần khai báo lại tabIndicator nữa
            const btnRegister = document.getElementById('btnRegister');
            const btnLogin = document.getElementById('btnLogin');
            const registerForm = document.getElementById('registerForm');
            const loginForm = document.getElementById('loginForm');

            btnRegister.onclick = () => {
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                
                btnRegister.classList.add('text-game-primary');
                btnRegister.classList.remove('text-slate-500');
                btnLogin.classList.add('text-slate-500');
                btnLogin.classList.remove('text-game-primary');
                
                tabIndicator.style.left = '0%';
            };

            btnLogin.onclick = () => {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                
                btnLogin.classList.add('text-game-primary');
                btnLogin.classList.remove('text-slate-500');
                btnRegister.classList.add('text-slate-500');
                btnRegister.classList.remove('text-game-primary');
                
                tabIndicator.style.left = '50%';
            };
        });

        // Khởi tạo sự kiện Enter
        setupEnterListener();
    </script>
</body>
</html>
