    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - S-STORES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 to-sky-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold text-indigo-600">S-STORES</a>
            <p class="text-slate-500 mt-2">Tạo cửa hàng của bạn</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="flex gap-4 mb-6">
                <button id="btnRegister" class="flex-1 py-2 font-semibold text-indigo-600 border-b-2 border-indigo-600">Đăng ký</button>
                <button id="btnLogin" class="flex-1 py-2 font-semibold text-slate-400">Đăng nhập</button>
            </div>

            <div id="registerForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Tên cửa hàng *</label>
                        <input type="text" id="storeName" placeholder="VD: Coffee Shop ABC" class="w-full p-3 border rounded-xl">
                        <p class="text-xs text-slate-400 mt-1">Link: s-stores.com/store/ten-cua-hang</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Email *</label>
                        <input type="email" id="regEmail" placeholder="you@example.com" class="w-full p-3 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Mật khẩu *</label>
                        <input type="password" id="regPassword" placeholder="••••••••" class="w-full p-3 border rounded-xl">
                    </div>
                    <button onclick="register()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition">Tạo cửa hàng</button>
                </div>
            </div>

            <div id="loginForm" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" class="w-full p-3 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Mật khẩu</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" class="w-full p-3 border rounded-xl">
                    </div>
                    <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition">Đăng nhập</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getUsers() { return JSON.parse(localStorage.getItem('multisell_users') || '[]'); }
        function saveUsers(users) { localStorage.setItem('multisell_users', JSON.stringify(users)); }

        function createStoreId(storeName) {
            return storeName.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        }

        function register() {
    let storeName = document.getElementById('storeName').value.trim();
    let email = document.getElementById('regEmail').value.trim().replace(/\./g, ','); // Firebase key không cho phép dấu chấm
    let password = document.getElementById('regPassword').value;

    if(!storeName || !email || !password) { alert("Nhập đủ thông tin!"); return; }
    let storeId = createStoreId(storeName);

    // Kiểm tra cửa hàng đã tồn tại chưa
    db.ref('users/' + email).once('value', (snapshot) => {
        if (snapshot.exists()) {
            alert("Email đã được đăng ký!");
        } else {
            // Lưu thông tin user và khởi tạo store
            let userData = { storeName, storeId, email, password };
            db.ref('users/' + email).set(userData);
            db.ref('stores/' + storeId).set({
                products: [],
                combos: [],
                orders: [],
                storeInfo: { storeName: storeName }
            }).then(() => {
                alert("Đăng ký thành công!");
                document.getElementById('btnLogin').click();
            });
        }
    });
}

function login() {
    let email = document.getElementById('loginEmail').value.trim().replace(/\./g, ',');
    let password = document.getElementById('loginPassword').value;

    db.ref('users/' + email).once('value', (snapshot) => {
        let user = snapshot.val();
        if(user && user.password === password) {
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = 'dashboard.html?store=' + user.storeId;
        } else {
            alert("Sai email hoặc mật khẩu!");
        }
    });
}

        document.getElementById('btnRegister').onclick = () => {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('btnRegister').classList.add('text-indigo-600', 'border-indigo-600');
            document.getElementById('btnRegister').classList.remove('text-slate-400');
            document.getElementById('btnLogin').classList.remove('text-indigo-600', 'border-indigo-600');
            document.getElementById('btnLogin').classList.add('text-slate-400');
        };
        document.getElementById('btnLogin').onclick = () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('btnLogin').classList.add('text-indigo-600', 'border-indigo-600');
            document.getElementById('btnLogin').classList.remove('text-slate-400');
            document.getElementById('btnRegister').classList.remove('text-indigo-600', 'border-indigo-600');
            document.getElementById('btnRegister').classList.add('text-slate-400');
        };
    </script>
</body>
</html>
